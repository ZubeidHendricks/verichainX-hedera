# DigitalOcean App Platform spec for verichainX-hedera.
#
# Matches the current repo layout: the working FastAPI backend is main_tidb.py at
# the repo root, and the Hedera service lives in hedera-service/. Secrets are set
# to placeholders here — enter the real (rotated) values in the DO console.
#
# NOTE: the original Celery worker + counterfeit_detection migrate job were removed
# because they target the src/counterfeit_detection package, which needs a heavier
# dependency set than the deployed main_tidb backend. Add them back only alongside a
# requirements file that satisfies that package.
name: verichainx-hedera-hackathon
region: nyc

services:
  # FastAPI backend (main_tidb.py) — serves the app UI and /api/v1 endpoints.
  - name: api
    github:
      repo: ZubeidHendricks/verichainX-hedera
      branch: main
      deploy_on_push: true
    build_command: pip install -r requirements.txt
    run_command: python -m uvicorn main_tidb:app --host 0.0.0.0 --port 8080
    environment_slug: python
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 8080
    health_check:
      # Liveness probe (DB-independent) so the app deploys healthy before the
      # real TiDB credentials are set. /health reports full readiness.
      http_path: /livez
      initial_delay_seconds: 30
      period_seconds: 10
      success_threshold: 1
      failure_threshold: 3
      timeout_seconds: 5
    routes:
      - path: /
    envs:
      - key: TIDB_HOST
        scope: RUN_AND_BUILD_TIME
        value: gateway01.us-west-2.prod.aws.tidbcloud.com
      - key: TIDB_PORT
        scope: RUN_AND_BUILD_TIME
        value: "4000"
      - key: TIDB_DATABASE
        scope: RUN_AND_BUILD_TIME
        value: verichainx
      - key: TIDB_USER
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_IN_DO_CONSOLE
      - key: TIDB_PASSWORD
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_IN_DO_CONSOLE
      - key: OPENAI_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_IN_DO_CONSOLE
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
        value: ${redis.DATABASE_URL}
      - key: ALLOWED_ORIGINS
        scope: RUN_AND_BUILD_TIME
        value: "*"

  # Hedera service (TypeScript / Node.js).
  - name: hedera-service
    source_dir: /hedera-service
    github:
      repo: ZubeidHendricks/verichainX-hedera
      branch: main
      deploy_on_push: true
    # --include=dev so TypeScript/@types are installed even with NODE_ENV=production.
    build_command: npm install --include=dev && npm run build
    run_command: npm start
    environment_slug: node-js
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3001
    health_check:
      http_path: /health
      initial_delay_seconds: 30
      period_seconds: 10
      success_threshold: 1
      failure_threshold: 3
      timeout_seconds: 5
    routes:
      - path: /hedera
    envs:
      - key: PORT
        scope: RUN_AND_BUILD_TIME
        value: "3001"
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: HEDERA_NETWORK
        scope: RUN_AND_BUILD_TIME
        value: testnet
      - key: HEDERA_ACCOUNT_ID
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_IN_DO_CONSOLE
      - key: HEDERA_PRIVATE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_IN_DO_CONSOLE
      - key: OPENAI_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
        value: REPLACE_IN_DO_CONSOLE
      - key: REDIS_URL
        scope: RUN_AND_BUILD_TIME
        value: ${redis.DATABASE_URL}

# Managed Redis for caching / pub-sub between services.
databases:
  - name: redis
    engine: REDIS
    version: "7"
    production: false
